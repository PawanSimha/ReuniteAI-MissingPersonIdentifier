<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Pawan Simha">
    <title>Page Not Found - ReuniteAI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="icon" href="{{ url_for('static', filename='images/favicon.png') }}" type="image/png" sizes="32x32">
    <style>
        body, input, button, select, textarea { font-family: 'Instrument Sans', sans-serif; }
        .error-container {
            text-align: center;
            padding: 60px 20px;
            max-width: 900px;
            margin: 0 auto 100px auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
        }
        .error-image {
            max-width: 100%;
            max-height: 900px;
            height: auto;
            margin-bottom: 30px;
            object-fit: contain;
            border-radius: 12px;
        }
        .error-message {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 30px;
            max-width: 600px;
        }
    </style>
</head>
<body>
    {% include 'navigation.html' %}

    <div class="container error-container">
        <img src="{{ url_for('static', filename='images/404.jpg') }}" alt="Page Not Found" class="error-image">
        <!-- <p class="error-message">Oops! The page you are looking for does not exist.</p> -->
        <a href="/user/home" class="btn-primary">Return Home</a>
    </div>

    {% include 'footer.html' %}
</body>
</html>
